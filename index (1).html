<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amryl Hazyran — Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── RESET & BASE ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #0b0d14;
      --bg-alt:      #0f1220;
      --bg-card:     #131627;
      --border:      #1e2338;
      --border-glow: #7c3aed40;
      --text:        #c8cfe8;
      --text-dim:    #6b7399;
      --text-bright: #eef0fb;
      --violet:      #7c3aed;
      --violet-lite: #a78bfa;
      --cyan:        #22d3ee;
      --cyan-lite:   #67e8f9;
      --green:       #34d399;
      --amber:       #fbbf24;
      --red:         #f87171;

      --mono:   'JetBrains Mono', monospace;
      --sans:   'Space Grotesk', sans-serif;
      --body:   'Inter', sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      font-size: 15px;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* ── SCANLINE OVERLAY ─────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,.04) 2px,
        rgba(0,0,0,.04) 4px
      );
      pointer-events: none;
      z-index: 9999;
    }

    /* ── NAVBAR ───────────────────────────────────────────────────── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: rgba(11,13,20,.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
    }

    .nav-logo {
      font-family: var(--mono);
      font-weight: 700;
      font-size: 1rem;
      color: var(--violet-lite);
      letter-spacing: 0.02em;
    }
    .nav-logo span { color: var(--cyan); }

    .nav-links {
      display: flex;
      gap: 0.25rem;
      list-style: none;
    }
    .nav-links a {
      font-family: var(--sans);
      font-size: 0.85rem;
      color: var(--text-dim);
      text-decoration: none;
      padding: 0.3rem 0.7rem;
      border-radius: 4px;
      transition: color .2s, background .2s;
    }
    .nav-links a:hover {
      color: var(--violet-lite);
      background: var(--border);
    }

    /* ── HERO ─────────────────────────────────────────────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 6rem 2rem 4rem;
      position: relative;
      overflow: hidden;
    }

    /* grid background */
    .hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%);
      opacity: .35;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      max-width: 1000px;
      width: 100%;
    }

    .hero-status {
      font-family: var(--sans);
      font-size: 0.85rem;
      color: var(--green);
      letter-spacing: .05em;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-weight: 500;
    }
    .hero-status::before {
      content: '';
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: .4; }
    }

    h1.hero-name {
      font-family: var(--sans);
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 700;
      color: var(--text-bright);
      line-height: 1.1;
      margin-bottom: 0.5rem;
    }
    h1.hero-name em {
      font-style: normal;
      color: var(--violet-lite);
    }

    .hero-sub {
      font-family: var(--body);
      font-size: 0.95rem;
      color: var(--text-dim);
      margin-bottom: 2rem;
      line-height: 1.5;
    }
    .hero-sub strong {
      color: var(--cyan);
      font-weight: 500;
    }

    .hero-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 2rem;
    }
    .badge {
      font-family: var(--mono);
      font-size: 0.68rem;
      padding: 0.3rem 0.75rem;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--text-dim);
      background: var(--bg-alt);
      letter-spacing: .04em;
    }
    .badge.violet { border-color: var(--violet); color: var(--violet-lite); }
    .badge.cyan   { border-color: var(--cyan);   color: var(--cyan-lite); }
    .badge.green  { border-color: var(--green);  color: var(--green); }

    .hero-cta {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .btn {
      font-family: var(--sans);
      font-weight: 500;
      font-size: 0.9rem;
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      text-decoration: none;
      cursor: pointer;
